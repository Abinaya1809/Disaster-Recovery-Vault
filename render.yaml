services:
  - type: web
    name: dr-vault-api
    runtime: node
    region: singapore
    rootDir: backend
    nodeVersion: "22"
    buildCommand: rm -rf ../node_modules node_modules .prisma && npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: MOCK_AWS
        value: "false"
    healthCheckPath: /health
